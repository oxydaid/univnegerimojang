services:
  # 1. PHP Application Container (PHP 8.4-FPM)
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mojang-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - mojang-network
      - db-network # Terhubung ke network database eksternal Anda

  # 2. Web Server Container (Nginx)
  web:
    image: nginx:alpine
    container_name: mojang-web
    restart: unless-stopped
    ports:
      # Port 8080 diekspos ke host lokal untuk pengujian langsung (http://localhost:8080)
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - mojang-network

  # 3. Cloudflare Tunnel Container (cloudflared)
  # Container ini menghubungkan web server lokal Anda ke Cloudflare Zero Trust Edge secara aman.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mojang-tunnel
    restart: unless-stopped
    # Jalankan tunnel menggunakan token. Anda bisa mengganti <YOUR_TUNNEL_TOKEN> langsung
    # dengan Token Tunnel dari Cloudflare Zero Trust Dashboard, atau menyediakannya sebagai
    # environment variable pada server lokal Anda.
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-<YOUR_TUNNEL_TOKEN>}
    depends_on:
      - web
    networks:
      - mojang-network

networks:
  # Network internal antar container di dalam docker-compose ini
  mojang-network:
    driver: bridge

  # Network eksternal untuk terhubung ke database yang sudah ada di container lain.
  # Ganti "database_network_name" dengan nama Docker network dari container database Anda.
  # Anda dapat melihat daftar network dengan perintah: docker network ls
  db-network:
    name: database_network_name
    external: true
